<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Notebook</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* PORTADA */
#cover {
  position: fixed;
  width: 100vw;
  height: 100vh;
  background: url("marble.jpg") center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 0.6s ease;
  z-index: 10;
}

#cover.open {
  transform: rotateY(-120deg);
}

.label {
  background: white;
  padding: 20px;
  border: 2px solid black;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* NOTEBOOK */
#notebook {
  width: 100vw;
  height: 100vh;
  background: white;
  position: relative;
}

/* PAGINA */
.page {
  width: 100%;
  height: 100%;

  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 28px,
      #4a90e2 29px
    ),
    linear-gradient(
      to right,
      transparent 0px,
      transparent 60px,
      rgba(255,0,0,0.6) 61px,
      transparent 62px
    );

  position: absolute;
}

/* CANVAS */
canvas {
  width: 100%;
  height: 100%;
  display: block;
  background: transparent;
}

/* NAV */
.nav {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  z-index: 5;
}

button {
  font-size: 18px;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="cover">
  <div class="label">
    <input placeholder="Name">
    <input placeholder="Subject">
    <input placeholder="School">
    <button onclick="openNotebook()">Open</button>
  </div>
</div>

<!-- LIBRETA -->
<div id="notebook">

  <div class="page">
    <canvas id="canvas"></canvas>
  </div>

  <div class="nav">
    <button onclick="prevPage()">←</button>
    <span id="pageNum">1</span>
    <button onclick="nextPage()">→</button>
  </div>

</div>

<script>
let page = 0;
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// Ajustar resolución real
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  loadPage();
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// DIBUJO
let drawing = false;

canvas.addEventListener("mousedown", () => {
  drawing = true;
  ctx.beginPath();
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawing) return;

  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#111";

  ctx.lineTo(e.clientX, e.clientY);
  ctx.stroke();
});

canvas.addEventListener("mouseup", () => {
  drawing = false;
  savePage();
});

// TOUCH (iPad / móvil)
canvas.addEventListener("touchstart", (e) => {
  drawing = true;
  ctx.beginPath();
});

canvas.addEventListener("touchmove", (e) => {
  if (!drawing) return;

  const touch = e.touches[0];

  ctx.lineTo(touch.clientX, touch.clientY);
  ctx.stroke();
});

canvas.addEventListener("touchend", () => {
  drawing = false;
  savePage();
});

// GUARDAR
function savePage() {
  const data = canvas.toDataURL();
  localStorage.setItem("page_" + page, data);
}

// CARGAR
function loadPage() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const data = localStorage.getItem("page_" + page);
  if (data) {
    const img = new Image();
    img.src = data;
    img.onload = () => ctx.drawImage(img, 0, 0);
  }

  document.getElementById("pageNum").innerText = page + 1;
}

// NAVEGACION
function nextPage() {
  page++;
  loadPage();
}

function prevPage() {
  if (page > 0) {
    page--;
    loadPage();
  }
}

// SWIPE
let startX = 0;

document.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", (e) => {
  let endX = e.changedTouches[0].clientX;

  if (endX < startX - 50) nextPage();
  if (endX > startX + 50) prevPage();
});

// PORTADA
function openNotebook() {
  document.getElementById("cover").classList.add("open");

  setTimeout(() => {
    document.getElementById("cover").style.display = "none";
  }, 600);
}
</script>

</body>
</html>
